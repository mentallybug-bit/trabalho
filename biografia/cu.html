<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Meu Portfólio</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        body {
            background-color: #121212; /* Preto suave (Dark Mode moderno) */
            color: #E0E0E0;            /* Branco suave */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- ESTILOS DA BARRA DE NAVEGAÇÃO --- */
        .navbar {
            background-color: #333; /* Cinzento escuro para a barra */
            overflow: hidden;
            padding: 0 20px;
        }

        /* Links normais da barra (Ex: Início) */
        .navbar a {
            float: left;
            font-size: 16px;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        /* --- ESTILOS DO MENU DROPDOWN --- */
        .dropdown {
            float: left;
            overflow: hidden;
        }

        /* Botão principal do menu Dropdown */
        .dropdown .dropbtn {
            font-size: 16px;  
            border: none;
            outline: none;
            color: white;
            padding: 14px 16px;
            background-color: inherit;
            font-family: inherit;
            margin: 0;
            cursor: pointer;
        }

        /* Comportamento ao passar o rato (Hover) na barra */
        .navbar a:hover, .dropdown:hover .dropbtn {
            background-color: #555; /* Cor mais clara ao passar o rato */
        }

        /* O conteúdo do menu (escondido por defeito) */
        .dropdown-content {
            display: none; /* Escondido */
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* Links dentro do Dropdown */
        .dropdown-content a {
            float: none;
            color: black; /* Texto preto para contraste no menu branco */
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        /* Cor ao passar o rato nos itens do dropdown */
        .dropdown-content a:hover {
            background-color: #ddd;
        }

        /* MOSTRAR o menu quando se passa o rato */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* --- CONTEÚDO DA PÁGINA --- */
        .conteudo {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#home">Início</a>
        
        <div class="dropdown">
            <button class="dropbtn">Sobre Mim 
                <i class="fa fa-caret-down"></i> &#9662; </button>
            <div class="dropdown-content">
                <a href="#quem-sou">Quem eu sou</a>
                <a href="#o-que-fiz">O que fiz</a>
                <a href="#tempo-livre">O meu tempo livre</a>
            </div>
        </div> 
    </div>

    <div class="conteudo">
        <h1>Bem-vindo ao meu Portfólio</h1>
        <p>Passa o rato sobre o menu "Sobre Mim" acima para veres as opções.</p>
        <p>O fundo mantém-se escuro para conforto visual.</p>
    </div>

</body>
</html>
